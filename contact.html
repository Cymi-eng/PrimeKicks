<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For More Information</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="contact">
         <h1>Get in touch with us</h1>

        <form>
            <label for="Full Names"> Full names</label>
            <input type="Name" id="name" placeholder="Full Name"  required><br>
            <label for="Email">Email address</label>
            <input type="email" id="email" placeholder="email@gmail.com" required>
            <label for="message"> Enter your message</label><br>
            <textarea name="message" id="message" rows="5" cols="50" required placeholder="tell us your fashion taste"></textarea><br>
            <button type="submit">send message</button> 
        </form>

    </div>
</body>
</html>
